spring.datasource.url=jdbc:h2:file:./data/attendance;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Run backend on alternate port to avoid conflicts
server.port=8082

# Face data directory (relative to working directory)
app.faces.dir=data/faces